name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - "packages/**/package.json"
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  id-token: write
  # required for pushing tags
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CURRENT=$(jq -r '.version' packages/core/package.json)
          PREVIOUS=$(git show HEAD~1:packages/core/package.json 2>/dev/null | jq -r '.version // empty' || echo "")
          if [ -z "$PREVIOUS" ] || [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish core
        run: |
          cd packages/core && bun pm pack
          npm publish *.tgz --access public --provenance

      - name: Publish react
        run: |
          cd packages/react && bun pm pack
          npm publish *.tgz --access public --provenance

      - name: Publish cli
        run: |
          cd packages/cli && bun pm pack
          npm publish *.tgz --access public --provenance

      - name: Publish tui
        run: |
          cd packages/tui && bun pm pack
          npm publish *.tgz --access public --provenance

      - name: Create and push tag
        run: |
          VERSION=$(jq -r '.version' packages/core/package.json)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
